<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Histórico - Controle de Estoque</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1e40af">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="notifications"></div>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar">
      <button class="sidebar-toggle" id="sidebar-toggle"><i class="fas fa-bars"></i></button>
      <span class="topbar-title">Histórico de Movimentações</span>
      <div class="topbar-actions">
        <div class="topbar-search" style="position:relative">
          <i class="fas fa-search"></i>
          <input type="text" id="global-search" placeholder="Buscar...">
          <div class="search-results" id="search-results"></div>
        </div>
      </div>
    </header>

    <main class="page-content">
      <div class="page-header">
        <div>
          <h2>Histórico de Movimentações</h2>
          <p>Rastreie todas as entradas e saídas de estoque</p>
        </div>
        <div class="page-header-actions">
          <button class="btn btn-ghost" onclick="exportMovements()"><i class="fas fa-download"></i> Exportar CSV</button>
          <button class="btn btn-outline" onclick="exportMovementsJSON()"><i class="fas fa-file-code"></i> Exportar JSON</button>
        </div>
      </div>

      <!-- FILTERS -->
      <div class="card" style="margin-bottom:20px">
        <div class="filters-bar" style="margin-bottom:0;flex-wrap:wrap">
          <div class="search-input" style="position:relative;flex:1;min-width:200px;max-width:280px">
            <i class="fas fa-search"></i>
            <input type="text" id="search-mov" class="form-control" placeholder="Produto ou código..." oninput="renderHistory()">
          </div>
          <select class="form-control" id="filter-mov-type" onchange="renderHistory()" style="max-width:150px">
            <option value="">Todos os tipos</option>
            <option value="entrada">Entradas</option>
            <option value="saida">Saídas</option>
          </select>
          <select class="form-control" id="filter-mov-user" onchange="renderHistory()" style="max-width:180px">
            <option value="">Todos os usuários</option>
          </select>
          <div style="display:flex;gap:8px;align-items:center">
            <label style="font-size:12px;color:var(--text-muted);white-space:nowrap">De:</label>
            <input type="date" id="filter-date-from" class="form-control" onchange="renderHistory()" style="max-width:145px">
            <label style="font-size:12px;color:var(--text-muted);white-space:nowrap">Até:</label>
            <input type="date" id="filter-date-to" class="form-control" onchange="renderHistory()" style="max-width:145px">
          </div>
          <button class="btn btn-ghost btn-sm" onclick="clearFilters()"><i class="fas fa-xmark"></i> Limpar</button>
        </div>
      </div>

      <!-- STATS SUMMARY -->
      <div class="stats-grid" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr));margin-bottom:20px" id="mov-stats"></div>

      <!-- TABLE -->
      <div class="card">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Tipo</th>
                <th>Produto</th>
                <th>Código</th>
                <th>Quantidade</th>
                <th>Saldo</th>
                <th>Data/Hora</th>
                <th>Responsável</th>
                <th>Observação</th>
              </tr>
            </thead>
            <tbody id="history-tbody"></tbody>
          </table>
        </div>
        <div id="history-pagination"></div>
      </div>
    </main>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/app.js"></script>
<script>
  let session;
  let histPage = 1;
  const histPerPage = 20;

  DB.init().then(async () => {
    session = Auth.requireAuth();
    if (session) {
      UI.init('historico');
      DB.addLog('INFO', session.userId, session.userName, 'Acessou Histórico');
      populateUsers();
      renderStats();
      renderHistory();
    }
  });

  function populateUsers() {
    const users = DB.getUsers();
    const select = document.getElementById('filter-mov-user');
    users.forEach(u => {
      select.innerHTML += `<option value="${Utils.esc(u.name)}">${Utils.esc(u.name)}</option>`;
    });
  }

  function getFiltered() {
    const q = (document.getElementById('search-mov').value || '').toLowerCase();
    const type = document.getElementById('filter-mov-type').value;
    const user = document.getElementById('filter-mov-user').value;
    const dateFrom = document.getElementById('filter-date-from').value;
    const dateTo = document.getElementById('filter-date-to').value;

    return DB.getMovements().filter(m => {
      if (q && !m.productName?.toLowerCase().includes(q) && !m.productCode?.toLowerCase().includes(q)) return false;
      if (type && m.type !== type) return false;
      if (user && m.userName !== user) return false;
      const mDate = new Date(m.createdAt || m.date);
      if (dateFrom && mDate < new Date(dateFrom + 'T00:00:00')) return false;
      if (dateTo && mDate > new Date(dateTo + 'T23:59:59')) return false;
      return true;
    });
  }

  function renderStats() {
    const movements = DB.getMovements();
    const entries = movements.filter(m => m.type === 'entrada');
    const exits = movements.filter(m => m.type === 'saida');
    const totalEntryQty = entries.reduce((s, m) => s + (m.quantity || 0), 0);
    const totalExitQty = exits.reduce((s, m) => s + (m.quantity || 0), 0);

    const today = new Date().toDateString();
    const todayMov = movements.filter(m => new Date(m.createdAt || m.date).toDateString() === today);

    document.getElementById('mov-stats').innerHTML = `
      <div class="stat-card"><div class="stat-icon blue"><i class="fas fa-right-left"></i></div><div class="stat-info"><div class="stat-value">${movements.length.toLocaleString()}</div><div class="stat-label">Total de Movimentações</div></div></div>
      <div class="stat-card"><div class="stat-icon green"><i class="fas fa-arrow-down"></i></div><div class="stat-info"><div class="stat-value">${totalEntryQty.toLocaleString()}</div><div class="stat-label">Total Entradas (itens)</div></div></div>
      <div class="stat-card"><div class="stat-icon red"><i class="fas fa-arrow-up"></i></div><div class="stat-info"><div class="stat-value">${totalExitQty.toLocaleString()}</div><div class="stat-label">Total Saídas (itens)</div></div></div>
      <div class="stat-card"><div class="stat-icon cyan"><i class="fas fa-calendar-day"></i></div><div class="stat-info"><div class="stat-value">${todayMov.length}</div><div class="stat-label">Hoje</div></div></div>
    `;
  }

  function renderHistory() {
    const filtered = getFiltered();
    const paginated = UI.paginate(filtered, histPage, histPerPage);
    const tbody = document.getElementById('history-tbody');

    if (paginated.items.length === 0) {
      tbody.innerHTML = `<tr><td colspan="8" class="table-empty"><i class="fas fa-clock-rotate-left"></i>Nenhuma movimentação encontrada</td></tr>`;
    } else {
      tbody.innerHTML = paginated.items.map(m => {
        const isEntry = m.type === 'entrada';
        return `
          <tr>
            <td>
              <span class="badge ${isEntry ? 'badge-success' : 'badge-danger'}">
                <i class="fas ${isEntry ? 'fa-arrow-down' : 'fa-arrow-up'}"></i>
                ${isEntry ? 'Entrada' : 'Saída'}
              </span>
            </td>
            <td style="font-weight:600">${Utils.esc(m.productName || '-')}</td>
            <td><span class="product-code">${Utils.esc(m.productCode || '-')}</span></td>
            <td style="font-weight:700;color:${isEntry ? 'var(--color-success)' : 'var(--color-danger)'}">
              ${isEntry ? '+' : '-'}${m.quantity}
            </td>
            <td style="color:var(--text-secondary)">${m.balance !== undefined ? m.balance : '-'}</td>
            <td style="color:var(--text-muted);font-size:12px;white-space:nowrap">${Utils.formatDateTime(m.createdAt || m.date)}</td>
            <td style="color:var(--text-secondary);font-size:12px">${Utils.esc(m.userName || '-')}</td>
            <td style="color:var(--text-muted);font-size:12px;max-width:200px">${Utils.esc((m.observation || '').substring(0, 80))}</td>
          </tr>
        `;
      }).join('');
    }

    UI.renderPagination(document.getElementById('history-pagination'), histPage, paginated.totalPages,
      (p) => { histPage = p; renderHistory(); }
    );
  }

  function clearFilters() {
    document.getElementById('search-mov').value = '';
    document.getElementById('filter-mov-type').value = '';
    document.getElementById('filter-mov-user').value = '';
    document.getElementById('filter-date-from').value = '';
    document.getElementById('filter-date-to').value = '';
    histPage = 1;
    renderHistory();
  }

  function exportMovements() {
    const csv = DB.exportCSV('movements');
    Utils.downloadCSV(csv, `historico_${new Date().toISOString().split('T')[0]}.csv`);
    UI.notify('Histórico exportado em CSV!', 'success');
  }

  function exportMovementsJSON() {
    const data = { exportDate: new Date().toISOString(), movements: DB.getMovements() };
    Utils.downloadJSON(data, `historico_${new Date().toISOString().split('T')[0]}.json`);
    UI.notify('Histórico exportado em JSON!', 'success');
  }

</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{});}
</script></body>
</html>
